defaults:
  - /base_config
  - /system: spo
  - /envs: uldenv2_base
  - _self_

env:
  seed: 0
  env_kwargs:
    target_groups: 5
    max_items: 25
    max_ems: 50
    max_episode_steps: 25
    generator_type: twophase_physics
    max_mult: 5
    prob_split_one_item: 0.3
    split_num_same_items: 6
    min_dimension: 100
    uld_preset: PMC-PLD

arch:
  total_timesteps: 150
  platform: null
  cuda_visible_devices: null
  num_envs: 8
  num_steps: 5

system:
  num_particles: 10
  search_depth: 10
  total_buffer_size: 512
  total_batch_size: 1024
  warmup_steps: 25

network:
  _delete_: true
  _target_: jax_rl.networks.ModularPolicyValueModel
  hidden_sizes: [16]
  input_adapter:
    _target_: jax_rl.networks.RustpalletInputAdapterV2
    d_model: 16
  shared_torso:
    _target_: jax_rl.networks.BinPackTorso
    hidden_dim: 16
    num_heads: 1
    num_layers: 1
  actor_head:
    _target_: jax_rl.networks.BinPackActorHead
    hidden_dim: 16
    num_rotations: 6
  critic_head:
    _target_: jax_rl.networks.BinPackCriticHead
    hidden_dim: 16

io:
  # Shared name used for both TensorBoard run folder and checkpoint save folder.
  # If null, defaults to the system name.
  name: spo_after
  logger:
    log_every: 1
    tensorboard_logdir: runs_tb
  checkpoint:
    # Output root; runtime writes: <system>/<name>
    checkpoint_dir: checkpoints
    # false: full resume (state + optimizer + key), true: params-only init
    transfer_weights_only: true
    # Save every N updates (0 = disabled)
    save_interval_steps: 0
    max_to_keep: 1
    keep_period: null
    # resume_from accepted forms:
    # - name: save_ppo
    # - algo/name: ppo/save_ppo, spo/spo_after
    # - run dir: /.../save_ppo
    # - step dir: /.../save_ppo/42
    # For name or algo/name, latest run for this env is used.
    resume_from: ppo/save_ppo

evaluations:
  policy_eval:
    action_selection: policy
    env: ${env}
    env_kwargs:
      max_items: 5
      target_groups: 5
    eval_every: 1
    num_episodes: 16
    max_steps_per_episode: 25
    greedy: true