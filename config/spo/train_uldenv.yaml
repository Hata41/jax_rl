defaults:
  - /base_config
  - _self_

env:
  # Supported env patterns in this repo: rustpool:<TaskId>, rlpallet:<TaskId>, jaxpallet:<Preset>
  # Gymnax fallback is also supported when env_name has no registered prefix.
  env_name: rlpallet:UldEnv-v2
  seed: 0
  env_kwargs:
    max_items: 10
    max_ems: 40
    max_episode_steps: 10
    uld_preset: PMC-PLD
    generator_type: twophase_physics
    target_groups: 10
    max_mult: 5
    prob_split_one_item: 0.3
    split_num_same_items: 6
    min_dimension: 100
    min_density: 1e-9
    max_density: 1e-2
    dataset_path: data/eval_data.csv
    reward_type: dense
    action_mode: Oriented
    item_representation: Group
    parallel_strategy: None

arch:
  total_timesteps: 150
  platform: null
  cuda_visible_devices: null
  num_envs: 3
  num_steps: 5

system:
  # Choices: ppo | alphazero | spo
  name: spo

  actor_lr: 0.0003
  critic_lr: 0.0003
  dual_lr: 0.0001
  # Choices: adam | adamw | sgd | rmsprop | schedule_free_adamw | schedule_free_sgd
  optimizer: adam
  # Choices: linear | constant | cosine
  lr_schedule: linear
  gamma: 0.99
  gae_lambda: 0.95
  value_coef: 0.5
  entropy_coef: 0.0
  max_grad_norm: 0.5

  mpo_epsilon: 0.1
  mpo_epsilon_policy: 0.05
  dual_init_log_temperature: -2.0
  dual_init_log_alpha: -2.0

  target_tau: 0.005
  num_particles: 10
  search_depth: 10
  search_gamma: 0.99
  search_gae_lambda: 0.95
  spo_resampling_mode: ess
  spo_resampling_period: 1
  spo_ess_threshold: 0.5

  num_simulations: 6
  max_depth: 4
  dirichlet_alpha: 0.3
  dirichlet_fraction: 0.25

  total_buffer_size: 512
  total_batch_size: 1024
  sample_sequence_length: 1
  period: 1
  warmup_steps: 25
  learner_updates_per_cycle: 1

network:
  _delete_: true
  _target_: jax_rl.networks.ModularPolicyValueModel
  input_adapter:
    _target_: jax_rl.networks.RustpalletInputAdapterV2
    d_model: 16
  shared_torso:
    _target_: jax_rl.networks.BinPackTorso
    hidden_dim: 16
    num_heads: 1
    num_layers: 1
  actor_head:
    _target_: jax_rl.networks.BinPackActorHead
    hidden_dim: 16
    num_rotations: 6
  critic_head:
    _target_: jax_rl.networks.BinPackCriticHead
    hidden_dim: 16

checkpointing:
  # Runtime appends: <checkpoint_dir>/<system.name>/<safe_env_name>/<run_token>
  # run_token = timestamp by default, or sanitized CLI logging.tensorboard_run_name if explicitly set.
  checkpoint_dir: checkpoints
  # Optional extra subfolder for naming checkpoints (examples: best_model, ablation_A, resume_exp_3)
  checkpoint_name: null
  # If true with resume_from set, load only params from checkpoint and reinitialize optimizer states.
  # Example transfer-learning run: resume_from: checkpoints/old_run/10 + transfer_weights_only: true
  transfer_weights_only: false
  save_interval_steps: 0
  max_to_keep: 1
  keep_period: null
  # If set, loads weights from this exact path; it is not mutated by runtime path injection.
  resume_from: null

logging:
  log_every: 1
  # Choices: null to disable TensorBoard, or a base directory (example: runs_tb)
  tensorboard_logdir: runs_tb
  # Runtime sets this to run_id unless explicitly overridden from CLI.
  tensorboard_run_name: spo_uldenv

evaluations: {}
