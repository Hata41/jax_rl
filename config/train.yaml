defaults:
  - base_config
  - _self_

# Environment routing:
# - rustpool: rustpool:<task_id>        (example: rustpool:BinPack-v0)
# - jaxpallet: jaxpallet:<preset>       (example: jaxpallet:PMC-PLD)
# - gymnax fallback: plain env id       (example: CartPole-v1)
env:
  env_name: rustpool:BinPack-v0
  seed: 0

system:
  total_timesteps: 2048
  num_envs: 8
  num_steps: 32
  actor_lr: 0.0003
  critic_lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  update_epochs: 1
  minibatch_size: 64
  max_grad_norm: 0.5

network:
  _delete_: true
  _target_: jax_rl.networks.BinPackPolicyValueModel
  hidden_dim: 32
  num_heads: 2
  num_layers: 1

checkpointing:
  checkpoint_dir: checkpoints
  save_interval_steps: 0
  max_to_keep: 1
  keep_period: null
  resume_from: null

logging:
  log_every: 1
  tensorboard_logdir: runs_tb
  tensorboard_run_name: minimal

evaluations:
  default_eval:
    env_name: rustpool:BinPack-v0
    eval_every: 1
    num_episodes: 16
    max_steps_per_episode: 30
    greedy: true
