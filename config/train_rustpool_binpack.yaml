defaults:
  - base_config
  - _self_

env:
  # Choices:
  # - rustpool:<task_id>   (example: rustpool:BinPack-v0)
  # - jaxpallet:<preset>   (example: jaxpallet:PMC-PLD)
  # - gymnax env id        (example: CartPole-v1)
  env_name: rustpool:BinPack-v0
  seed: 0
  # Optional constructor kwargs forwarded to selected env backend.
  # Example: {max_items: 50}
  env_kwargs:
    max_items: 20

system:
  total_timesteps: 2048000
  # Choices: null (auto/default), "cpu", "cuda"
  platform: null
  # Choices: null (all visible), "0", "1", "0,1", ...
  cuda_visible_devices: null
  num_envs: 64
  num_steps: 32
  actor_lr: 0.0003
  critic_lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  update_epochs: 1
  minibatch_size: 64
  max_grad_norm: 0.5

network:
  _delete_: true
  _target_: jax_rl.networks.BinPackPolicyValueModel
  hidden_dim: 16
  num_heads: 1
  num_layers: 1

checkpointing:
  checkpoint_dir: checkpoints
  save_interval_steps: 0
  max_to_keep: 1
  keep_period: null
  resume_from: null

logging:
  log_every: 1
  tensorboard_logdir: runs_tb
  tensorboard_run_name: rustpool_binpack

evaluations:
  default_eval:
    env_name: rustpool:BinPack-v0
    env_kwargs:
      max_items: 20
    eval_every: 1
    num_episodes: 160
    max_steps_per_episode: 20
    greedy: true

  second_eval:
    env_name: rustpool:BinPack-v0
    env_kwargs:
      max_items: 30
    eval_every: 1
    num_episodes: 160
    max_steps_per_episode: 30
    greedy: true