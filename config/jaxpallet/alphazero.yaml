defaults:
  - /base_config
  - /system: alphazero
  - _self_

env:
  env_name: jaxpallet:PMC-PLD
  seed: 0
  env_kwargs:
    max_items: 50

arch:
  total_timesteps: 2048
  platform: null
  cuda_visible_devices: null
  num_envs: 8
  num_steps: 25

network:
  _delete_: true
  _target_: jax_rl.networks.BinPackPolicyValueModel
  hidden_dim: 32
  num_heads: 2
  num_layers: 1

checkpointing:
  checkpoint_dir: checkpoints
  checkpoint_name: null
  transfer_weights_only: false
  save_interval_steps: 0
  max_to_keep: 1
  keep_period: null
  resume_from: null

logging:
  log_every: 1
  tensorboard_logdir: runs_tb
  tensorboard_run_name: alphazero_jaxpallet

evaluations:
  policy_eval:
    action_selection: policy
    env: ${jaxpallet.env}
    env_kwargs:
      max_items: 100
    eval_every: 1
    num_episodes: 32
    max_steps_per_episode: 30
    greedy: true

  search_eval:
    action_selection: search
    env: ${jaxpallet.env}
    env_kwargs:
      max_items: 100
    eval_every: 1
    num_episodes: 32
    max_steps_per_episode: 30
    greedy: true
