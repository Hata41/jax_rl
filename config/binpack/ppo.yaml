defaults:
  - /base_config
  - /system: ppo
  - _self_

env:
  env_name: rustpool:BinPack-v0
  seed: 0
  env_kwargs:
    max_items: 20

arch:
  total_timesteps: 2048000
  platform: null
  cuda_visible_devices: null
  num_envs: 64
  num_steps: 32

network:
  _delete_: true
  _target_: jax_rl.networks.BinPackPolicyValueModel
  hidden_dim: 16
  num_heads: 1
  num_layers: 1

checkpointing:
  checkpoint_dir: checkpoints
  checkpoint_name: null
  transfer_weights_only: false
  save_interval_steps: 0
  max_to_keep: 1
  keep_period: null
  resume_from: null

logging:
  log_every: 1
  tensorboard_logdir: runs_tb
  tensorboard_run_name: ppo_binpack

evaluations:
  default_eval:
    env: ${binpack.env}
    env_kwargs:
      max_items: 20
    eval_every: 1
    num_episodes: 160
    max_steps_per_episode: 20
    greedy: true

  second_eval:
    env: ${binpack.env}
    env_kwargs:
      max_items: 30
    eval_every: 1
    num_episodes: 160
    max_steps_per_episode: 30
    greedy: true
