defaults:
  - /base_config
  - /system: alphazero
  - _self_

env:
  env_name: rustpool:BinPack-v0
  seed: 0
  env_kwargs: {}

arch:
  total_timesteps: 2048
  platform: null
  cuda_visible_devices: null
  num_envs: 8
  num_steps: 25

network:
  _delete_: true
  _target_: jax_rl.networks.BinPackPolicyValueModel
  hidden_dim: 32
  num_heads: 2
  num_layers: 1

io:
  # Shared name used for both TensorBoard run folder and checkpoint save folder.
  # If null, defaults to the system name.
  name: alphazero_binpack
  logger:
    log_every: 1
    tensorboard_logdir: runs_tb
  checkpoint:
    # Output root; runtime writes: <system>/<name>
    checkpoint_dir: checkpoints
    # false: full resume (state + optimizer + key), true: params-only init
    transfer_weights_only: false
    # Save every N updates (0 = disabled)
    save_interval_steps: 0
    max_to_keep: 1
    keep_period: null
    # resume_from accepted forms:
    # - name: save_ppo
    # - algo/name: ppo/save_ppo, spo/spo_after
    # - run dir: /.../save_ppo
    # - step dir: /.../save_ppo/42
    # For name or algo/name, latest run for this env is used.
    resume_from: null

evaluations:
  policy_eval:
    action_selection: policy
    env: ${binpack.env}
    env_kwargs:
      max_items: 20
    eval_every: 1
    num_episodes: 32
    max_steps_per_episode: 20
    greedy: true

  search_eval:
    action_selection: search
    env: ${binpack.env}
    env_kwargs:
      max_items: 20
    eval_every: 1
    num_episodes: 32
    max_steps_per_episode: 20
    greedy: true
