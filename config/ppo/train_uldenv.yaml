defaults:
  - /base_config
  - _self_

env:
  # Supported env patterns in this repo: rustpool:<TaskId>, rlpallet:<TaskId>, jaxpallet:<Preset>
  # Gymnax fallback is also supported when env_name has no registered prefix.
  env_name: rlpallet:UldEnv-v2
  seed: 0
  env_kwargs:
    max_items: 10
    max_ems: 40
    max_episode_steps: 30
    uld_preset: PMC-PLD
    generator_type: twophase_physics
    target_groups: 10
    max_mult: 5
    prob_split_one_item: 0.3
    split_num_same_items: 6
    min_dimension: 100
    min_density: 1e-9
    max_density: 1e-2
    dataset_path: data/eval_data.csv
    reward_type: dense
    action_mode: Oriented
    item_representation: Group
    parallel_strategy: None

system:
  # Choices: ppo | alphazero
  name: ppo
  total_timesteps: 2048
  # Choices: null (auto), cpu, gpu, tpu
  platform: null
  # Choices: null or GPU id list string (examples: "0", "0,1")
  cuda_visible_devices: null
  num_envs: 8
  num_steps: 32
  actor_lr: 0.0003
  critic_lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  update_epochs: 1
  minibatch_size: 64
  max_grad_norm: 0.5

network:
  _delete_: true
  _target_: jax_rl.networks.ModularPolicyValueModel
  input_adapter:
    _target_: jax_rl.networks.RustpalletInputAdapterV2
    d_model: 16
  shared_torso:
    _target_: jax_rl.networks.BinPackTorso
    hidden_dim: 16
    num_heads: 1
    num_layers: 1
  actor_head:
    _target_: jax_rl.networks.BinPackActorHead
    hidden_dim: 16
    num_rotations: 6
  critic_head:
    _target_: jax_rl.networks.BinPackCriticHead
    hidden_dim: 16

checkpointing:
  # Runtime appends: <checkpoint_dir>/<system.name>/<safe_env_name>/<timestamp>
  checkpoint_dir: checkpoints
  save_interval_steps: 0
  max_to_keep: 1
  keep_period: null
  # If set, loads weights from this exact path; it is not mutated by runtime path injection.
  resume_from: null

logging:
  log_every: 1
  # Choices: null to disable TensorBoard, or a base directory (example: runs_tb)
  tensorboard_logdir: runs_tb
  # Runtime sets this to unique run_id unless explicitly overridden from CLI.
  tensorboard_run_name: ppo_uldenv

evaluations:
  default_eval:
    env_name: rlpallet:UldEnv-v2
    env_kwargs:
      max_items: 10
      target_groups: 10
    eval_every: 1
    num_episodes: 160
    max_steps_per_episode: 30
    greedy: true

  stress_eval:
    env_name: rlpallet:UldEnv-v2
    env_kwargs:
      max_items: 25
      max_ems: 50
      max_episode_steps: 25
      uld_preset: PMC-PLD
      generator_type: twophase_physics
      target_groups: 5
      max_mult: 5
      prob_split_one_item: 0.3
      split_num_same_items: 6
      min_dimension: 100
      min_density: 1e-9
      max_density: 1e-2
      dataset_path: data/eval_data.csv
      reward_type: dense
      action_mode: Oriented
      item_representation: Group
      parallel_strategy: None
    eval_every: 1
    num_episodes: 160
    max_steps_per_episode: 40
    greedy: true
