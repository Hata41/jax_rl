defaults:
  - /base_config
  - _self_

env:
  # Supported env patterns in this repo: rustpool:<TaskId>, rlpallet:<TaskId>, jaxpallet:<Preset>
  # Gymnax fallback is also supported when env_name has no registered prefix.
  env_name: jaxpallet:PMC-PLD
  seed: 0
  env_kwargs:
    max_items: 50

system:
  # Choices: ppo | alphazero
  name: ppo
  total_timesteps: 2048000
  # Choices: null (auto), cpu, gpu, tpu
  platform: null
  # Choices: null or GPU id list string (examples: "0", "0,1")
  cuda_visible_devices: null
  num_envs: 64
  num_steps: 32
  actor_lr: 0.0003
  critic_lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  update_epochs: 1
  minibatch_size: 64
  max_grad_norm: 0.5

network:
  _delete_: true
  _target_: jax_rl.networks.BinPackPolicyValueModel
  hidden_dim: 32
  num_heads: 2
  num_layers: 1

checkpointing:
  # Runtime appends: <checkpoint_dir>/<system.name>/<safe_env_name>/<timestamp>
  checkpoint_dir: checkpoints
  save_interval_steps: 0
  max_to_keep: 1
  keep_period: null
  # If set, loads weights from this exact path; it is not mutated by runtime path injection.
  resume_from: null

logging:
  log_every: 1
  # Choices: null to disable TensorBoard, or a base directory (example: runs_tb)
  tensorboard_logdir: runs_tb
  # Runtime sets this to unique run_id unless explicitly overridden from CLI.
  tensorboard_run_name: ppo_jaxpallet

evaluations:
  default_eval:
    env_name: jaxpallet:PMC-PLD
    env_kwargs:
      max_items: 100
    eval_every: 1
    num_episodes: 160
    max_steps_per_episode: 30
    greedy: true
