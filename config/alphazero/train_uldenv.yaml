defaults:
  - /base_config
  - _self_

env:
  env_name: rlpallet:UldEnv-v2
  seed: 0
  env_kwargs:
    max_items: 20
    max_ems: 40
    max_episode_steps: 30
    uld_preset: PMC-PLD
    generator_type: twophase_physics
    target_groups: 10
    max_mult: 5
    prob_split_one_item: 0.3
    split_num_same_items: 6
    min_dimension: 100
    min_density: 1e-9
    max_density: 1e-2
    dataset_path: data/eval_data.csv
    reward_type: dense
    action_mode: Oriented
    item_representation: Group
    parallel_strategy: None

system:
  name: alphazero
  total_timesteps: 2048
  platform: null
  cuda_visible_devices: null
  num_envs: 8
  num_steps: 25

  actor_lr: 0.0003
  critic_lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  update_epochs: 1
  minibatch_size: 64
  max_grad_norm: 0.5

  num_simulations: 6
  max_depth: 4
  dirichlet_alpha: 0.3
  dirichlet_fraction: 0.25
  search_method: muzero

  total_buffer_size: 512
  total_batch_size: 1024
  sample_sequence_length: 1
  period: 1
  warmup_steps: 25
  learner_updates_per_cycle: 1
  tree_memory_budget_mb: 124

network:
  _delete_: true
  _target_: jax_rl.networks.ModularPolicyValueModel
  input_adapter:
    _target_: jax_rl.networks.RustpalletInputAdapterV2
    d_model: 16
  shared_torso:
    _target_: jax_rl.networks.BinPackTorso
    hidden_dim: 16
    num_heads: 1
    num_layers: 1
  actor_head:
    _target_: jax_rl.networks.BinPackActorHead
    hidden_dim: 16
    num_rotations: 6
  critic_head:
    _target_: jax_rl.networks.BinPackCriticHead
    hidden_dim: 16

checkpointing:
  checkpoint_dir: checkpoints
  save_interval_steps: 0
  max_to_keep: 1
  keep_period: null
  resume_from: null

logging:
  log_every: 1
  tensorboard_logdir: runs_tb
  tensorboard_run_name: alphazero_uldenv

evaluations:
  policy_eval:
    action_selection: policy
    env_name: rlpallet:UldEnv-v2
    env_kwargs:
      max_items: 10
      target_groups: 10
    eval_every: 1
    num_episodes: 32
    max_steps_per_episode: 30
    greedy: true

  search_eval:
    action_selection: search
    env_name: rlpallet:UldEnv-v2
    env_kwargs:
      max_items: 10
      target_groups: 10
    eval_every: 1
    num_episodes: 32
    max_steps_per_episode: 30
    greedy: true
