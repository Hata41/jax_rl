defaults:
  - /base_config
  - _self_

env:
  env_name: jaxpallet:PMC-PLD
  seed: 0
  env_kwargs:
    max_items: 50

system:
  name: alphazero
  total_timesteps: 2048
  platform: null
  cuda_visible_devices: null
  num_envs: 8
  num_steps: 25

  actor_lr: 0.0003
  critic_lr: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  update_epochs: 1
  minibatch_size: 64
  max_grad_norm: 0.5

  num_simulations: 6
  max_depth: 4
  dirichlet_alpha: 0.3
  dirichlet_fraction: 0.25
  search_method: muzero

  total_buffer_size: 512
  total_batch_size: 1024
  sample_sequence_length: 1
  period: 1
  warmup_steps: 25
  learner_updates_per_cycle: 1
  tree_memory_budget_mb: 124

network:
  _delete_: true
  _target_: jax_rl.networks.BinPackPolicyValueModel
  hidden_dim: 32
  num_heads: 2
  num_layers: 1

checkpointing:
  checkpoint_dir: checkpoints
  save_interval_steps: 0
  max_to_keep: 1
  keep_period: null
  resume_from: null

logging:
  log_every: 1
  tensorboard_logdir: runs_tb
  tensorboard_run_name: alphazero_jaxpallet

evaluations:
  policy_eval:
    action_selection: policy
    env_name: jaxpallet:PMC-PLD
    env_kwargs:
      max_items: 100
    eval_every: 1
    num_episodes: 32
    max_steps_per_episode: 30
    greedy: true

  search_eval:
    action_selection: search
    env_name: jaxpallet:PMC-PLD
    env_kwargs:
      max_items: 100
    eval_every: 1
    num_episodes: 32
    max_steps_per_episode: 30
    greedy: true
