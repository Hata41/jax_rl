defaults:
  - /base_config
  - _self_

env:
  # Supported env patterns in this repo: rustpool:<TaskId>, rlpallet:<TaskId>, jaxpallet:<Preset>
  # Gymnax fallback is also supported when env_name has no registered prefix.
  env_name: jaxpallet:PMC-PLD
  seed: 0
  env_kwargs:
    max_items: 50

arch:
  total_timesteps: 2048
  platform: null
  cuda_visible_devices: null
  num_envs: 8
  num_steps: 25

system:
  # Choices: ppo | alphazero
  name: alphazero

  actor_lr: 0.0003
  critic_lr: 0.0003
  # Choices: adam | adamw | sgd | rmsprop | schedule_free_adamw | schedule_free_sgd
  optimizer: adam
  # Choices: linear | constant | cosine
  lr_schedule: linear
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  update_epochs: 1
  minibatch_size: 64
  max_grad_norm: 0.5

  num_simulations: 6
  max_depth: 4
  dirichlet_alpha: 0.3
  dirichlet_fraction: 0.25
  # Choices: muzero | gumbel
  search_method: muzero

  total_buffer_size: 512
  total_batch_size: 1024
  sample_sequence_length: 1
  period: 1
  warmup_steps: 25
  learner_updates_per_cycle: 1
  tree_memory_budget_mb: 124

network:
  _delete_: true
  _target_: jax_rl.networks.BinPackPolicyValueModel
  hidden_dim: 32
  num_heads: 2
  num_layers: 1

checkpointing:
  # Runtime appends: <checkpoint_dir>/<system.name>/<safe_env_name>/<run_token>
  # run_token = timestamp by default, or sanitized CLI logging.tensorboard_run_name if explicitly set.
  checkpoint_dir: checkpoints
  # Optional extra subfolder for naming checkpoints (examples: best_model, ablation_A, resume_exp_3)
  checkpoint_name: null
  # If true with resume_from set, load only params from checkpoint and reinitialize optimizer states.
  # Example transfer-learning run: resume_from: checkpoints/old_run/10 + transfer_weights_only: true
  transfer_weights_only: false
  save_interval_steps: 0
  max_to_keep: 1
  keep_period: null
  # If set, loads weights from this exact path; it is not mutated by runtime path injection.
  resume_from: null

logging:
  log_every: 1
  # Choices: null to disable TensorBoard, or a base directory (example: runs_tb)
  tensorboard_logdir: runs_tb
  # Runtime sets this to run_id unless explicitly overridden from CLI.
  tensorboard_run_name: alphazero_jaxpallet

evaluations:
  policy_eval:
    # Choices: policy | search
    action_selection: policy
    env_name: jaxpallet:PMC-PLD
    env_kwargs:
      max_items: 100
    eval_every: 1
    num_episodes: 32
    max_steps_per_episode: 30
    greedy: true

  search_eval:
    # Choices: policy | search
    action_selection: search
    env_name: jaxpallet:PMC-PLD
    env_kwargs:
      max_items: 100
    eval_every: 1
    num_episodes: 32
    max_steps_per_episode: 30
    greedy: true
